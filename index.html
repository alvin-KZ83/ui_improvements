<!DOCTYPE html>
<html class="dark" lang="ja">

<a href="lecxp.html">lecxp</a>

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Lecture Transcription</title>

  <!-- Google Fonts & Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

  <!-- External CSS -->
  <link rel="stylesheet" href="tpstyle.css" />
</head>

<body>

  <div id="app">

    <!-- Header -->
    <header id="header">
      <div class="recording-indicator">
        <div class="indicator-dot" onclick="startTranscription()">
          <div class="indicator-inner"></div>
        </div>
        <p id="status" class="recording-time"></p>
      </div>

      <h2 id="lecture-title">授業のタイトル</h2>

      <div>
        <button class="btn" onclick="stopTranscription()">終了</button>
        <button class="btn" onclick="debugTest()">ディバッグ</button>
      </div>
    </header>

    <!-- Floating capture button -->
    <button id="camera-btn">
      <span class="material-symbols-outlined filled">photo_camera</span>
    </button>

    <!-- Add this hidden popup container -->
    <div id="camera-popup" class="hidden">
      <video id="camera-stream" autoplay></video>
      <button id="capture-btn">Capture</button>
      <canvas id="snapshot" class="hidden"></canvas>
    </div>
    
    <!-- Transcription area -->
    <main id="transcription">
      <div id="transcript-overlay" aria-hidden="true"></div>
      <div id="live-transcript"></div>
    </main>

    <!-- Keyword collector -->
    <footer id="keyword-footer">
      <div class="footer-content">
        <div id="guide-msg" class="footer-header">
          <p class="footer-title">ここでキーワードをドラッグしてください</p>
          <p class="footer-subtitle">上からのキーワードをハイライトする、ここでキープをできます</p>
        </div>

        <div id="note-area" class="keyword-list"></div>
      </div>
    </footer>

    <div id="modeBox" class="mode assistive">Neutral Focus (0.0)</div>

  </div>

  <script type="module" src="./main.js"></script>

  <!--ADDED 4/7/2026-->
  <script>
    const modeBox = document.getElementById("modeBox");
    const transcriptionArea = document.getElementById("transcription");

    let focusScore = 0;

    const MAX_SCORE = 5;
    const MIN_SCORE = -5;

    const TYPING_BOOST = 0.5;
    const MOUSE_PENALTY = 0.05;
    const IDLE_DECAY = 0.05;

    function clampScore() {
      focusScore = Math.max(MIN_SCORE, Math.min(MAX_SCORE, focusScore));
    }

    function setTranscriptMode(mode) {
      transcriptionArea.classList.remove(
        "mode-immersive",
        "mode-assistive",
        "mode-automated"
      );
      transcriptionArea.classList.add(`mode-${mode}`);
    }

    function updateUI() {
      if (focusScore > 2) {
        modeBox.className = "mode immersive";
        modeBox.textContent = `Higher Focus (${focusScore.toFixed(1)})`;
        setTranscriptMode("immersive");
      } else if (focusScore < -2) {
        modeBox.className = "mode automated";
        modeBox.textContent = `Lower Focus (${focusScore.toFixed(1)})`;
        setTranscriptMode("automated");
      } else {
        modeBox.className = "mode assistive";
        modeBox.textContent = `Neutral Focus (${focusScore.toFixed(1)})`;
        setTranscriptMode("assistive");
      }
    }

    document.addEventListener("keydown", () => {
      focusScore += TYPING_BOOST;
      clampScore();
      updateUI();
    });

    document.addEventListener("mousemove", () => {
      focusScore -= MOUSE_PENALTY;
      clampScore();
      updateUI();
    });

    document.addEventListener("wheel", () => {
      focusScore -= MOUSE_PENALTY;
      clampScore();
      updateUI();
    });

    setInterval(() => {
      focusScore -= IDLE_DECAY;
      clampScore();
      updateUI();
    }, 500);

    updateUI();
  </script>
</body>

</html>
