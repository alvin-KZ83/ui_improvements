<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="utf-8" />
    <meta nameviewport="width=device-width, initial-scale=1.0" />
    <title>Lecture Timeline View</title>

    <link rel="stylesheet" href="npstyle.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet" />
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />
</head>

<body class="tl-body">

    <header class="tl-header">
        <h2 class="tl-header-title">Class Sample</h2>
        <button class="tl-back-btn">
            <span class="material-symbols-outlined">arrow_back</span>
            Back
        </button>
    </header>

    <main class="tl-main">
        <section class="tl-title-block">
            <h1 class="tl-title">Timeline</h1>
            <p class="tl-date">October 26, 2023</p>
        </section>

        <section class="tl-controls">
            <div class="tl-chips">
                <div id="filterAll" class="chip chip-active">All</div>

                <div id="filterImages" class="chip">
                    <span class="material-symbols-outlined chip-icon image-icon">image</span>
                    Images
                </div>

                <div id="filterPhrases" class="chip">
                    <span class="material-symbols-outlined chip-icon">format_quote</span>
                    Phrases
                </div>
            </div>

            <div class="tl-zoom">
                <button id="zoomOut" class="zoom-btn">
                    <span class="material-symbols-outlined">remove</span>
                </button>

                <button id="zoomIn" class="zoom-btn">
                    <span class="material-symbols-outlined">add</span>
                </button>
            </div>
        </section>

        <section class="tl-upload">
            <input id="jsonUpload" type="file" accept="application/json" />
            <input id="imageUpload" type="file" accept="image/png" multiple />
            <button id="buildTimeline" class="build-btn">Build Timeline</button>
        </section>

        <section id="timelineContainer" class="timeline-container"></section>
    </main>

    <script src="display.js"></script>
</body>
</html>
