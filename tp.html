<!DOCTYPE html>
<html class="dark" lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Lecture Transcription</title>

  <!-- Google Fonts & Material Symbols -->
  <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@400;500;700&display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet" />

  <!-- External CSS -->
  <link rel="stylesheet" href="tpstyle.css" />
</head>

<body>
  <div id="app">
    <!-- Header -->
    <header id="header">
      <div class="recording-indicator">
        <button class="indicator-dot" onclick="startTranscription()">
          <div class="indicator-inner"></div>
        </button>
        <p id="status" class="recording-time"></p>
      </div>

      <h2 id="lecture-title">Class Sample</h2>

      <div>
        <button class="btn" onclick="stopTranscription()">End</button>
        <button class="btn" onclick="debugTest()">Debug</button>
      </div>
    </header>

    <!-- Floating capture button -->
    <button id="camera-btn">
      <span class="material-symbols-outlined filled">photo_camera</span>
    </button>

    <!-- Add this hidden popup container -->
    <div id="camera-popup" class="hidden">
      <video id="camera-stream" autoplay></video>
      <button id="capture-btn">📸 Capture</button>
      <canvas id="snapshot" class="hidden"></canvas>
    </div>

    <!-- Transcription area -->
    <main id="transcription">
      <div id="live-transcript"></div>
    </main>

    <!-- Keyword collector -->
    <footer id="keyword-footer">
      <div class="footer-content">
        <div id="guide-msg" class="footer-header">
          <p class="footer-title">Drag keywords here</p>
          <p class="footer-subtitle">Highlight words or phrases from the transcription above to save it for later review.</p>
        </div>

        <div id="note-area" class="keyword-list">
          <!-- <div class="keyword-chip">
            <span>Quantum Entanglement</span>
            <button class="chip-close">
              <span class="material-symbols-outlined">close</span>
            </button>
          </div> -->
        </div>
      </div>
    </footer>
  </div>

  <script type="module" src="./main.js"></script>
</body>
</html>
